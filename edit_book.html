<!DOCTYPE html>
<html>
<head>
    <title>Edit Book</title>
</head>
<body>

<h2>Edit Book</h2>

<form method="POST">

    <input
        type="text"
        name="title"
        value="{{ book[1] }}"
    >

    <br><br>

    <input
        type="text"
        name="author"
        value="{{ book[2] }}"
    >

    <br><br>

    <input
        type="text"
        name="genre"
        value="{{ book[3] }}"
    >

    <br><br>

    <input
        type="number"
        name="year"
        value="{{ book[4] }}"
    >

    <br><br>

    <input
        type="number"
        name="copies"
        value="{{ book[5] }}"
    >

    <br><br>

    <button type="submit">
        Update Book
    </button>

</form>

</body>
</html>
