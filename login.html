{% extends 'base.html' %}

{% block title %}
Login
{% endblock %}

{% block content %}

<style>

body{
    background:linear-gradient(135deg,#2563eb,#0f172a);
}

.login-card{

    width:420px;

    margin:60px auto;

    background:white;

    border-radius:20px;

    padding:40px;

    box-shadow:0 15px 40px rgba(0,0,0,.2);
}

.logo{

    font-size:60px;

    text-align:center;
}

.title{

    text-align:center;

    font-weight:bold;

    color:#2563eb;

    margin-bottom:5px;
}

.subtitle{

    text-align:center;

    color:gray;

    margin-bottom:30px;
}

.form-control{

    height:50px;
}

.btn-login{

    width:100%;

    height:50px;

    font-size:18px;

    border-radius:10px;
}

.register{

    text-align:center;

    margin-top:20px;
}

</style>

<div class="login-card">

<div class="logo">

📚

</div>

<h2 class="title">

Digital Library

</h2>

<p class="subtitle">

Library Management System

</p>

<form method="POST">

<div class="mb-3">

<label>Email</label>

<input
type="email"
name="email"
class="form-control"
placeholder="Enter Email"
required>

</div>

<div class="mb-3">

<label>Password</label>

<div class="input-group">

<input
type="password"
name="password"
id="password"
class="form-control"
placeholder="Enter Password"
required>

<button
class="btn btn-outline-secondary"
type="button"
onclick="togglePassword()">

<i class="fa fa-eye"></i>

</button>

</div>

</div>

<div class="mb-3">

<label>Login As</label>

<select
name="role"
class="form-select"
required>

<option value="student">

Student

</option>

<option value="admin">

Admin

</option>

</select>

</div>

<div class="form-check mb-3">

<input
class="form-check-input"
type="checkbox">

<label>

Remember Me

</label>

</div>

<button
class="btn btn-primary btn-login">

<i class="fa fa-sign-in-alt"></i>

Login

</button>

</form>

<div class="register">

Don't have an account?

<a href="/register">

Register

</a>

</div>

</div>

<script>

function togglePassword(){

var x=document.getElementById("password");

if(x.type==="password")

x.type="text";

else

x.type="password";

}

</script>

{% endblock %}
