<!DOCTYPE html>
<html>
<head>
    <title>Review Book</title>

    <style>

        body{
            font-family: Arial, sans-serif;
            background:#f4f4f4;
            margin:0;
            padding:0;
        }

        .container{
            width:500px;
            margin:50px auto;
            background:white;
            padding:25px;
            border-radius:10px;
            box-shadow:0 0 10px rgba(0,0,0,0.2);
        }

        h2{
            text-align:center;
            color:#333;
        }

        label{
            display:block;
            margin-top:15px;
            font-weight:bold;
        }

        input,
        textarea{
            width:100%;
            padding:10px;
            margin-top:5px;
            border:1px solid #ccc;
            border-radius:5px;
            box-sizing:border-box;
        }

        textarea{
            height:120px;
            resize:none;
        }

        button{
            width:100%;
            margin-top:20px;
            padding:12px;
            border:none;
            background:#28a745;
            color:white;
            font-size:16px;
            border-radius:5px;
            cursor:pointer;
        }

        button:hover{
            background:#218838;
        }

        .back{
            display:block;
            text-align:center;
            margin-top:15px;
            text-decoration:none;
        }

    </style>

</head>
<body>

<div class="container">

    <h2>Review Book</h2>

    <form method="POST">

        <label>Rating (1-5)</label>

        <input
            type="number"
            name="rating"
            min="1"
            max="5"
            required
        >

        <label>Comment</label>

        <textarea
            name="comment"
            placeholder="Write your review..."
            required
        ></textarea>

        <button type="submit">
            Submit Review
        </button>

    </form>

    <a href="/books" class="back">
        Back to Books
    </a>

</div>

</body>
</html>
